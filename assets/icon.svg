<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title>Poké Price Lens icon</title>
  <desc>A stylized Poke Ball merged with a price lens for the Poké Price Lens Chrome extension.</desc>
  <defs>
    <linearGradient id="bg" x1="18" y1="14" x2="108" y2="116" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f2547"/>
      <stop offset="1" stop-color="#091527"/>
    </linearGradient>
    <linearGradient id="topRed" x1="64" y1="16" x2="64" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff6b6b"/>
      <stop offset="1" stop-color="#d7263d"/>
    </linearGradient>
    <linearGradient id="bottomLight" x1="64" y1="64" x2="64" y2="106" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#dbe7f5"/>
    </linearGradient>
    <linearGradient id="lens" x1="74" y1="54" x2="110" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8bd3ff" stop-opacity=".96"/>
      <stop offset="1" stop-color="#2d7ff9" stop-opacity=".94"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#020617" flood-opacity=".35"/>
    </filter>
  </defs>

  <rect x="8" y="8" width="112" height="112" rx="28" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <circle cx="54" cy="58" r="32" fill="url(#topRed)"/>
    <path d="M22 58a32 32 0 0 0 64 0Z" fill="url(#bottomLight)"/>
    <path d="M22 58h64" fill="none" stroke="#0f172a" stroke-width="8" stroke-linecap="round"/>
    <circle cx="54" cy="58" r="10.5" fill="#f8fafc" stroke="#0f172a" stroke-width="6"/>
    <circle cx="54" cy="58" r="3" fill="#93c5fd"/>
  </g>

  <g transform="translate(72 72)">
    <circle cx="0" cy="0" r="18" fill="url(#lens)" stroke="#e0f2fe" stroke-width="4"/>
    <circle cx="0" cy="0" r="10" fill="none" stroke="#eff6ff" stroke-width="2" opacity=".85"/>
    <path d="M12 12 28 28" fill="none" stroke="#dbeafe" stroke-width="8" stroke-linecap="round"/>
    <path d="M-7 -6c4-5 9-7 14-8" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity=".8"/>
  </g>
</svg>
